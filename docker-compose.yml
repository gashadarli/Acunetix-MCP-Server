services:
  acunetix-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acunetix-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    environment:
      - ACUNETIX_BASE_URL=${ACUNETIX_BASE_URL}
      - ACUNETIX_API_KEY=${ACUNETIX_API_KEY}
      - VERIFY_SSL=${VERIFY_SSL:-false}
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
